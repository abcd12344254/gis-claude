services:
  - type: web
    name: gis-claude
    env: python
    buildCommand: pip install -r server/requirements.txt
    startCommand: cd server && python main.py
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GAODE_API_KEY
        sync: false
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
